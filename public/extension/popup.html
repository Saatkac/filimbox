<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player Helper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header img {
      width: 40px;
      height: 40px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status span {
      font-size: 14px;
      color: #22c55e;
    }
    .info {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
    }
    .features {
      margin-top: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }
    .features h3 {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .features ul {
      list-style: none;
      font-size: 12px;
      color: #cbd5e1;
    }
    .features li {
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .features li::before {
      content: '✓';
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="Logo">
    <h1>Video Player Helper</h1>
  </div>
  
  <div class="status">
    <div class="status-dot"></div>
    <span>Eklenti Aktif</span>
  </div>
  
  <p class="info">
    Bu eklenti, video akışlarının sorunsuz oynatılmasını sağlar. CORS ve erişim sorunlarını otomatik olarak çözer.
  </p>
  
  <div class="features">
    <h3>Özellikler</h3>
    <ul>
      <li>HLS/M3U8 video desteği</li>
      <li>CORS sorunlarını çözme</li>
      <li>Tüm video formatlarını destekleme</li>
      <li>Otomatik header düzenleme</li>
    </ul>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
